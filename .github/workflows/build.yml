name: HiFiShifter Cross-Platform Build (Windows, macOS, Linux)

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    outputs:
      artifact-name: frontend-dist
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run build

      - name: Archive frontend dist
        run: |
          cd frontend
          if [ -d dist ]; then zip -r ../frontend-dist.zip dist; else echo "No dist produced"; exit 1; fi

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend-dist.zip

  backend:
    name: Build Backend (${{ matrix.name }})
    needs: frontend-build
    runs-on: ${{ matrix.os }}
    env:
      # Prevent CI environment from converting warnings into errors.
      RUSTFLAGS: "-Awarnings"
      # Set to '1' to skip cargo check steps for faster CI.
      HIFISHIFTER_SKIP_CARGO_CHECK: "1"
      # Frontend dist is provided via artifact and should not be rebuilt by build.rs.
      HIFISHIFTER_SKIP_FRONTEND_BUILD: "1"
      # Keep Linux WebKit ABI consistent with the dependency script and AppImage runtime.
      HIFISHIFTER_WEBKIT_ABI: "4.1"
      # Helps AppImage tools run in CI environments without FUSE mounts.
      APPIMAGE_EXTRACT_AND_RUN: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86_64
            os: windows-latest
            cargo_target: x86_64-pc-windows-msvc
            cargo_no_default_features: "0"
            cargo_features: ""
            tauri_args: --target x86_64-pc-windows-msvc
            ort_ep: ""

          - name: windows-arm64
            os: windows-11-arm
            cargo_target: aarch64-pc-windows-msvc
            cargo_no_default_features: "1"
            cargo_features: onnx
            tauri_args: --target aarch64-pc-windows-msvc -- --no-default-features --features onnx
            ort_ep: ""

          - name: macos-arm64
            os: macos-latest
            cargo_target: aarch64-apple-darwin
            cargo_no_default_features: "1"
            cargo_features: onnx
            tauri_args: --target aarch64-apple-darwin -- --no-default-features --features onnx
            ort_ep: ""

          - name: macos-x86_64
            os: macos-15-intel
            cargo_target: x86_64-apple-darwin
            cargo_no_default_features: "1"
            cargo_features: onnx
            tauri_args: --target x86_64-apple-darwin -- --no-default-features --features onnx
            # x86_64 macOS uses ORT CPU provider to avoid CUDA prebuilt constraints.
            ort_ep: cpu

          - name: linux-x86_64
            os: ubuntu-24.04
            cargo_target: x86_64-unknown-linux-gnu
            cargo_no_default_features: "1"
            cargo_features: onnx
            tauri_args: --target x86_64-unknown-linux-gnu -- --no-default-features --features onnx
            ort_ep: ""

          - name: linux-arm64
            os: ubuntu-24.04-arm
            cargo_target: aarch64-unknown-linux-gnu
            cargo_no_default_features: "1"
            cargo_features: onnx
            tauri_args: --target aarch64-unknown-linux-gnu -- --no-default-features --features onnx
            ort_ep: ""

    steps:
      - uses: actions/checkout@v6

      - name: Download frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Extract frontend dist (Unix)
        if: runner.os != 'Windows'
        run: |
          ZIP=$(ls frontend-dist | grep -E "\.zip$" || true)
          if [ -z "$ZIP" ]; then echo "No zip artifact found in frontend-dist"; ls -la frontend-dist; exit 1; fi
          unzip frontend-dist/$ZIP -d frontend
        shell: bash

      - name: Extract frontend dist (Windows)
        if: runner.os == 'Windows'
        run: |
          $zip = Get-ChildItem -Path frontend-dist -Filter *.zip | Select-Object -First 1
          if (-not $zip) { Write-Host "No zip artifact found in frontend-dist"; Get-ChildItem frontend-dist; exit 1 }
          Expand-Archive -Path $zip.FullName -DestinationPath frontend -Force
        shell: pwsh

      - name: Cache cargo registry (Unix)
        if: runner.os != 'Windows'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo registry (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: |
            %USERPROFILE%\.cargo\registry
            %USERPROFILE%\.cargo\git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Rust toolchain (Windows x86_64)
        if: runner.os == 'Windows' && runner.arch == 'X64'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          cache: false

      - name: Setup Rust toolchain (Windows ARM64)
        if: runner.os == 'Windows' && runner.arch == 'ARM64'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable-aarch64-pc-windows-msvc
          cache: false

      - name: Setup Rust toolchain (non-Windows)
        if: runner.os != 'Windows'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          sudo apt-get update -y
          sudo apt-get install -y jq libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-0 libjavascriptcoregtk-4.1-0 librsvg2-dev patchelf pkg-config libasound2-dev
          sudo apt-get install -y libappindicator3-dev || sudo apt-get install -y libayatana-appindicator3-dev

          PKG_DIRS=""
          for d in /usr/lib/*-linux-gnu/pkgconfig /usr/lib/pkgconfig /usr/share/pkgconfig; do
            if [ -d "$d" ]; then
              if [ -z "$PKG_DIRS" ]; then
                PKG_DIRS="$d"
              else
                PKG_DIRS="$PKG_DIRS:$d"
              fi
            fi
          done
          echo "PKG_CONFIG_PATH=$PKG_DIRS" >> "$GITHUB_ENV"
          pkg-config --exists alsa
          pkg-config --modversion alsa
        shell: bash

      - name: Ensure AppImage bundling prerequisites (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          sudo apt-get update -y
          sudo apt-get install -y zsync desktop-file-utils libglib2.0-bin libgtk-3-bin librsvg2-bin appstream xdg-utils
          command -v pkg-config
          command -v patchelf
          command -v mksquashfs
          command -v glib-compile-schemas
          command -v desktop-file-validate
          command -v appstreamcli
          command -v gtk-update-icon-cache
          command -v xdg-open
          if [ ! -x /usr/bin/xdg-open ]; then
            XDG_OPEN_PATH="$(command -v xdg-open || true)"
            if [ -n "$XDG_OPEN_PATH" ]; then
              sudo mkdir -p /usr/bin
              sudo ln -sf "$XDG_OPEN_PATH" /usr/bin/xdg-open
            fi
          fi
          test -x /usr/bin/xdg-open
          if [ "${{ matrix.name }}" = "linux-x86_64" ]; then
            command -v zsyncmake
          fi
        shell: bash

      - name: Generate Linux WebKit include map for AppImage
        if: runner.os == 'Linux'
        working-directory: backend/src-tauri
        run: |
          set -euxo pipefail

          mapfile -t WEBKIT_FILES < <(
            {
              dpkg -L libwebkit2gtk-4.1-0 2>/dev/null || true
              dpkg -L libjavascriptcoregtk-4.1-0 2>/dev/null || true
            } | grep -E '^/usr/lib/.+/(libwebkit2gtk-4.1\.so\.0|libjavascriptcoregtk-4.1\.so\.0|webkit2gtk-4.1($|/))' | sort -u
          )

          FILES_JSON='{}'
          COUNT=0
          for src in "${WEBKIT_FILES[@]}"; do
            if [ -e "$src" ]; then
              dest="${src#/}"
              FILES_JSON="$(jq -c --arg k "$dest" --arg v "$src" '. + {($k): $v}' <<<"$FILES_JSON")"
              COUNT=$((COUNT + 1))
            fi
          done

          if [ "$COUNT" -eq 0 ]; then
            echo "No WebKit runtime files discovered for AppImage bundling."
            exit 1
          fi

          jq -n --argjson files "$FILES_JSON" '{bundle:{linux:{appimage:{files:$files}}}}' > tauri.linux.conf.json

          echo "Generated tauri.linux.conf.json with $COUNT WebKit entries"
          jq '.bundle.linux.appimage.files | keys' tauri.linux.conf.json
        shell: bash

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x ./scripts/install_deps_macos.sh || true
          SKIP_FRONTEND=1 bash ./scripts/install_deps_macos.sh
        shell: bash

      - name: Ensure DMG toolchain availability (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euxo pipefail
          # tauri-bundler's bundle_dmg.sh invokes SetFile for volume icon metadata.
          if ! command -v SetFile >/dev/null 2>&1; then
            SETFILE_PATH="$(xcrun --find SetFile || true)"
            if [ -n "$SETFILE_PATH" ]; then
              echo "$(dirname "$SETFILE_PATH")" >> "$GITHUB_PATH"
            else
              echo '#!/usr/bin/env bash' | sudo tee /usr/local/bin/SetFile >/dev/null
              echo 'exit 0' | sudo tee -a /usr/local/bin/SetFile >/dev/null
              sudo chmod +x /usr/local/bin/SetFile
            fi
          fi
          command -v hdiutil
          command -v SetFile
        shell: bash

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          pwsh -NoProfile -NonInteractive -ExecutionPolicy Bypass -File .\scripts\install_deps_windows.ps1 -SkipFrontend
        shell: pwsh

      - name: Install frontend deps
        run: |
          npm --prefix frontend ci

      - name: Build (cargo check) on Unix
        if: ${{ runner.os != 'Windows' && env.HIFISHIFTER_SKIP_CARGO_CHECK != '1' }}
        working-directory: backend/src-tauri
        env:
          HIFISHIFTER_SKIP_NATIVE_BUILD: "1"
          HIFISHIFTER_SKIP_FRONTEND_BUILD: "1"
          RUST_BACKTRACE: "1"
        run: |
          if [ "${{ matrix.cargo_no_default_features }}" = "1" ]; then
            cargo check --lib --all-targets --target "${{ matrix.cargo_target }}" --no-default-features --features "${{ matrix.cargo_features }}" --verbose
          else
            cargo check --lib --all-targets --target "${{ matrix.cargo_target }}" --verbose
          fi
        shell: bash

      - name: Build (cargo check) on Windows
        if: ${{ runner.os == 'Windows' && env.HIFISHIFTER_SKIP_CARGO_CHECK != '1' }}
        working-directory: backend/src-tauri
        env:
          HIFISHIFTER_SKIP_NATIVE_BUILD: "1"
          HIFISHIFTER_SKIP_FRONTEND_BUILD: "1"
        run: |
          if ("${{ matrix.cargo_no_default_features }}" -eq "1") {
            cargo check --lib --all-targets --target "${{ matrix.cargo_target }}" --no-default-features --features "${{ matrix.cargo_features }}" --verbose
          } else {
            cargo check --lib --all-targets --target "${{ matrix.cargo_target }}" --verbose
          }
        shell: pwsh

      - name: Build and bundle via tauri-action
        if: runner.os != 'Linux'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HIFISHIFTER_SKIP_FRONTEND_BUILD: "1"
          HIFISHIFTER_ORT_EP: ${{ matrix.ort_ep }}
        with:
          projectPath: backend/src-tauri
          args: ${{ matrix.tauri_args }}

      - name: Build Linux AppImage via tauri-action (primary)
        if: runner.os == 'Linux'
        id: linux-appimage-build
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HIFISHIFTER_SKIP_FRONTEND_BUILD: "1"
          HIFISHIFTER_ORT_EP: ${{ matrix.ort_ep }}
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_APPSTREAM: "1"
        with:
          projectPath: backend/src-tauri
          args: --target ${{ matrix.cargo_target }} --bundles appimage -- --no-default-features --features ${{ matrix.cargo_features }}

      - name: Dump linuxdeploy diagnostics on failure (Linux)
        if: runner.os == 'Linux' && failure()
        run: |
          set -euxo pipefail
          echo "==== Linux env ===="
          uname -a || true
          ldd --version || true
          echo "==== Generated AppImage WebKit config ===="
          cat backend/src-tauri/tauri.linux.conf.json || true
          echo "==== Candidate bundle dirs ===="
          find backend/src-tauri/target -maxdepth 6 -type d | grep -E 'bundle/appimage|bundle/appimage_deb|bundle' || true
          echo "==== Candidate logs/files ===="
          find backend/src-tauri/target -maxdepth 8 -type f | grep -E 'linuxdeploy|appimage|\.desktop|\.log$' || true
        shell: bash

      - name: Determine bundles artifact name (non-Windows)
        if: runner.os != 'Windows'
        id: determine-non-windows-bundles-name
        run: |
          $prod = 'HiFiShifter'
          $ver = '0.0.0'
          $conf = 'backend/src-tauri/tauri.conf.json'
          if (Test-Path $conf) {
            try {
              $j = Get-Content $conf -Raw | ConvertFrom-Json -ErrorAction Stop
              if ($j.productName) { $prod = $j.productName }
              if ($j.version) { $ver = $j.version }
              if ($j.package) {
                if (-not $j.productName -and $j.package.productName) { $prod = $j.package.productName }
                if (-not $j.productName -and -not $j.package.productName -and $j.package.name) { $prod = $j.package.name }
                if (-not $j.version -and $j.package.version) { $ver = $j.package.version }
              }
            } catch { }
          }

          $prod = $prod -replace '["\\/:*?<>|]', ''
          $ver = $ver -replace '["\\/:*?<>|]', ''
          $prodSafe = $prod -replace '\s+', '_'
          $verSafe = $ver -replace '^v', ''

          $artifactName = "${prodSafe}_v${verSafe}_${{ matrix.name }}-bundles"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "artifact-name=$artifactName"
        shell: pwsh

      - name: Upload AppImage artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.determine-non-windows-bundles-name.outputs.artifact-name }}
          path: |
            backend/src-tauri/target/${{ matrix.cargo_target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload DMG artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.determine-non-windows-bundles-name.outputs.artifact-name }}
          path: |
            backend/src-tauri/target/${{ matrix.cargo_target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Determine Windows installer artifact name
        if: runner.os == 'Windows'
        id: determine-windows-installer-name
        run: |
          $prod = 'HiFiShifter'
          $ver = '0.0.0'
          $conf = 'backend/src-tauri/tauri.conf.json'
          if (Test-Path $conf) {
            try {
              $j = Get-Content $conf -Raw | ConvertFrom-Json -ErrorAction Stop
              if ($j.productName) { $prod = $j.productName }
              if ($j.version) { $ver = $j.version }
              if ($j.package) {
                if (-not $j.productName -and $j.package.productName) { $prod = $j.package.productName }
                if (-not $j.productName -and -not $j.package.productName -and $j.package.name) { $prod = $j.package.name }
                if (-not $j.version -and $j.package.version) { $ver = $j.package.version }
              }
            } catch { }
          }

          $prod = $prod -replace '["\\/:*?<>|]', ''
          $ver = $ver -replace '["\\/:*?<>|]', ''
          $prodSafe = $prod -replace '\s+', '_'
          $verSafe = $ver -replace '^v', ''

          if ($env:RUNNER_ARCH -eq 'ARM64') {
            $arch = 'arm64'
          } else {
            $arch = 'x86_64'
          }

          $artifactName = "${prodSafe}_v${verSafe}_windows-${arch}-installer"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "artifact-name=$artifactName"
        shell: pwsh

      - name: Upload installer package (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.determine-windows-installer-name.outputs.artifact-name }}
          path: |
            backend/src-tauri/target/${{ matrix.cargo_target }}/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

      - name: Create portable ZIP (Windows)
        if: runner.os == 'Windows'
        working-directory: ${{ github.workspace }}
        run: |
          pwsh -NoProfile -NonInteractive -ExecutionPolicy Bypass -File .\scripts\pack-portable.ps1 -SkipBuild
        shell: pwsh

      - name: Determine Windows portable artifact name
        if: runner.os == 'Windows'
        id: determine-windows-portable-name
        run: |
          $prod = 'HiFiShifter'
          $ver = '0.0.0'
          $conf = 'backend/src-tauri/tauri.conf.json'
          if (Test-Path $conf) {
            try {
              $j = Get-Content $conf -Raw | ConvertFrom-Json -ErrorAction Stop
              if ($j.productName) { $prod = $j.productName }
              if ($j.version) { $ver = $j.version }
              if ($j.package) {
                if (-not $j.productName -and $j.package.productName) { $prod = $j.package.productName }
                if (-not $j.productName -and -not $j.package.productName -and $j.package.name) { $prod = $j.package.name }
                if (-not $j.version -and $j.package.version) { $ver = $j.package.version }
              }
            } catch { }
          }

          $prod = $prod -replace '["\\/:*?<>|]', ''
          $ver = $ver -replace '["\\/:*?<>|]', ''
          $prodSafe = $prod -replace '\s+', '_'
          $verSafe = $ver -replace '^v', ''

          if ($env:RUNNER_ARCH -eq 'ARM64') {
            $arch = 'arm64'
          } else {
            $arch = 'x86_64'
          }

          $artifactName = "${prodSafe}_v${verSafe}_windows-${arch}-portable"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "artifact-name=$artifactName"
        shell: pwsh

      - name: Upload portable ZIP (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.determine-windows-portable-name.outputs.artifact-name }}
          path: |
            dist/*portable-win-*.zip
          if-no-files-found: warn
